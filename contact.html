    <section class="contact-section">
        <h1>پەیوەندی</h1>
        
        <div class="contact-content">
            <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
                <div class="form-group">
                    <label for="name">ناو:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">ئیمێیل:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="subject">بابەت:</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div class="form-group">
                    <label for="message">پەیام:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn-primary">ناردن</button>
            </form>

            <div class="contact-info">
                <h2>زانیاری تێوەرگەرانە</h2>
                <p><strong>ئیمێیل:</strong> info@pixelway.com</p>
                <p><strong>فۆن:</strong> +964 (0) XXX-XXXX-XXXX</p>
                <p><strong>شار:</strong> سلێمانی، کوردستان</p>
                
                <div class="social-links">
                    <h3>ئامرازی دروستی</h3>
                    <a href="https://github.com" target="_blank">GitHub</a>
                    <a href="https://linkedin.com" target="_blank">LinkedIn</a>
                    <a href="https://twitter.com" target="_blank">Twitter</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 رێگەی پیکسڵ. تێکەڵی مافی پارێزراو.</p>
    </footer>
</body>
